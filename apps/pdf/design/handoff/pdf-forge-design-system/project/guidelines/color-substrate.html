<!-- @dsCard group="Colors" viewport="700x150" name="Substrate ramp" subtitle="The cool-graphite workbench surface — never white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--r-ctl); border: 1px solid var(--sub-600); }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--ink-700); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); }
  .use { font-family: var(--font-ui); font-size: 11px; color: var(--ink-600); line-height: 14px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sub-900)"></div><div class="meta"><span class="tok">--sub-900</span><span class="hex">#0E1116</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sub-850)"></div><div class="meta"><span class="tok">--sub-850</span><span class="hex">#141922</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sub-800)"></div><div class="meta"><span class="tok">--sub-800</span><span class="hex">#1A2029</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sub-700)"></div><div class="meta"><span class="tok">--sub-700</span><span class="hex">#222A35</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sub-600)"></div><div class="meta"><span class="tok">--sub-600</span><span class="hex">#2D3743</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sub-500)"></div><div class="meta"><span class="tok">--sub-500</span><span class="hex">#3A4654</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--sub-400)"></div><div class="meta"><span class="tok">--sub-400</span><span class="hex">#566373</span></div></div>
  </div>
</body>
</html>
