<!-- @dsCard group="Spacing" viewport="700x180" name="Control sizing" subtitle="Compact 28 · default 32 · touch/primary 40 (≥44px hit on mobile)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 22px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .ctl {
    display: inline-flex; align-items: center; padding: 0 14px;
    background: var(--sub-700); border: 1px solid var(--sub-500);
    border-radius: var(--r-ctl); color: var(--ink-900);
    font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  }
  .spec { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); }
  .iconbtn {
    width: 28px; height: 28px; display: grid; place-items: center;
    background: var(--sub-700); border: 1px solid var(--sub-500); border-radius: var(--r-ctl);
    color: var(--ink-700);
  }
</style>
</head>
<body>
  <div class="spec"><div class="ctl" style="height:28px">Compact</div><span class="tok">28px · --ctl-h-compact</span></div>
  <div class="spec"><div class="ctl" style="height:32px">Default</div><span class="tok">32px · --ctl-h</span></div>
  <div class="spec"><div class="ctl" style="height:40px;background:var(--press-500);border-color:var(--press-500);color:#fff">Primary</div><span class="tok">40px · --ctl-h-touch</span></div>
  <div class="spec">
    <div class="iconbtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg></div>
    <span class="tok">28px box · 16px glyph</span>
  </div>
</body>
</html>
