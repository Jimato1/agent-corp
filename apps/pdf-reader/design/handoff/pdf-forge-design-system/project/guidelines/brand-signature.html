<!-- @dsCard group="Brand" viewport="700x300" name="Signature — the board" subtitle="Pages are physical sheets on a lit workbench. Press-blue handles them." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; }
  .well {
    background: var(--sub-700); border-radius: var(--r-panel);
    box-shadow: var(--inset-well-top), var(--inset-well-frame);
    padding: 22px 20px; display: flex; align-items: center; gap: 14px;
    background-image: radial-gradient(var(--sub-600) 1px, transparent 1px);
    background-size: 16px 16px; background-position: -8px -8px;
  }
  .sheet {
    position: relative; width: 96px; height: 132px; flex: none;
    background: var(--paper-0); border-radius: var(--r-sheet);
    border-bottom: 2px solid var(--paper-edge); box-shadow: var(--shadow-sheet-rest);
  }
  .sheet .lines { position: absolute; inset: 12px 12px 22px; display: flex; flex-direction: column; gap: 6px; }
  .sheet .lines i { height: 3px; background: #d9d9d4; border-radius: 1px; display: block; }
  .sheet .lines i:nth-child(3) { width: 70%; }
  .chip {
    position: absolute; left: -3px; bottom: -6px;
    background: rgba(14,17,22,0.82); color: var(--ink-900);
    font-family: var(--font-mono); font-size: 11px; font-variant-numeric: tabular-nums;
    padding: 2px 7px; border-radius: var(--r-pill);
  }
  .sheet.sel { outline: 2px solid var(--press-500); outline-offset: -2px; box-shadow: var(--shadow-sheet-rest); }
  .sheet.sel::before { content: ""; position: absolute; inset: 0; background: var(--press-tint); opacity: 0.28; border-radius: var(--r-sheet); }
  .sheet.sel .tab { position: absolute; top: 5px; right: 5px; width: 16px; height: 16px; border-radius: 3px; background: var(--press-500); display: grid; place-items: center; }
  .sheet.lift { transform: rotate(1.5deg) scale(1.04); box-shadow: var(--shadow-sheet-lift); z-index: 3; }
  /* insertion bar in the gap */
  .insert { width: 2px; height: 132px; background: var(--press-500); border-radius: 1px; position: relative; flex: none; }
  .insert::before, .insert::after { content: ""; position: absolute; left: -2px; width: 6px; height: 2px; background: var(--press-500); border-radius: 1px; }
  .insert::before { top: -2px; } .insert::after { bottom: -2px; }
  .ghost { width: 96px; height: 132px; flex: none; border: 1px dashed var(--sub-500); border-radius: var(--r-sheet); }
</style>
</head>
<body>
  <div class="well">
    <div class="sheet"><div class="lines"><i></i><i></i><i></i></div><span class="chip">1</span></div>
    <div class="sheet sel"><div class="lines"><i></i><i></i><i></i></div><span class="tab"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span><span class="chip">2</span></div>
    <div class="insert"></div>
    <div class="ghost"></div>
    <div class="sheet lift"><div class="lines"><i></i><i></i><i></i></div><span class="chip">4 ⟳ 90°</span></div>
    <div class="sheet"><div class="lines"><i></i><i></i><i></i></div><span class="chip">5</span></div>
  </div>
</body>
</html>
