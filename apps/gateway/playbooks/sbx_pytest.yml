---
# sbx_pytest — a tier-0 SANDBOX profile (D-7). Runs ONLY inside a fresh podman container the
# Gateway just spawned from the pinned harness image (no suite networks, no creds mounted,
# CPU/mem/wall-clock caps, default-deny egress). `input_ref` names the doc/note under test;
# its content is UNTRUSTED (adversarial) — it is data, never interpolated into a command.
- name: sbx_pytest (sandbox test harness)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    input_ref: ""
  tasks:
    - name: Run the pytest harness against the fetched input
      ansible.builtin.command:
        cmd: /opt/harness/run-pytest "{{ input_ref }}"
      register: result
      changed_when: false
      failed_when: false
