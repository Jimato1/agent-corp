---
# health_probe — READ-ONLY post-action health confirmation (§6.1). Never mutates the host.
# Used by the health checker and by orphaned-run reconciliation (a read-only probe playbook).
- name: health_probe (read-only)
  hosts: all
  become: false
  gather_facts: false
  tasks:
    - name: System is fully running
      ansible.builtin.command:
        cmd: systemctl is-system-running --wait
      register: sysstate
      changed_when: false
      failed_when: sysstate.stdout not in ['running', 'degraded']

    - name: No failed units
      ansible.builtin.command:
        cmd: systemctl --failed --no-legend
      register: failed_units
      changed_when: false

    - name: Reboot marker cleared
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_marker
