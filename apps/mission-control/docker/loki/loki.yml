# mc_logstore — a single-binary Loki-class log store the BFF tails (proxy access logs etc.).
# Rebuildable/expirable (PLAN §3.1): logs are NOT a canonical store. Retention per log_retention.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 0

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h    # 7d (log_retention default, PLAN §8)

table_manager:
  retention_deletes_enabled: true
  retention_period: 168h
