<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); padding: var(--space-6); }
  .demo { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-ui); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); width: 92px; flex: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, StatusPill } = window.HelmDesignSystem_f4cb26;
  function Demo() {
    return (
      <div className="demo">
        <div className="row">
          <span className="lbl">Buttons</span>
          <Button tone="primary">Approve</Button>
          <Button tone="secondary" icon="⧉">Copy plan</Button>
          <Button tone="ghost">Cancel</Button>
          <Button tone="danger" icon="⛔">Lift stop…</Button>
          <Button tone="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lbl">Sizes</span>
          <Button tone="secondary" size="compact">Compact 28</Button>
          <Button tone="secondary">Default 32</Button>
          <Button tone="primary" size="large">Primary 40</Button>
        </div>
        <div className="row">
          <span className="lbl">Icon</span>
          <IconButton icon="/" label="Search" variant="solid" />
          <IconButton icon="⧉" label="Copy" />
          <IconButton icon="⋯" label="More" />
          <IconButton icon="⛒" label="Revoke" variant="danger" />
          <IconButton icon="/" label="Toggled" pressed />
        </div>
        <div className="row">
          <span className="lbl">Inputs</span>
          <Input icon="/" placeholder="Filter tickets…" style={{ width: 200 }} />
          <Input mono placeholder="T-000000" style={{ width: 150 }} />
          <Input invalid defaultValue="bad" hint="Must match." style={{ width: 130 }} />
        </div>
        <div className="row">
          <span className="lbl">Pills</span>
          <StatusPill tone="verified" glyph="✔">Verified</StatusPill>
          <StatusPill tone="interactive" glyph="⧉">Active</StatusPill>
          <StatusPill tone="halt" glyph="▮▮">Safe-stopped</StatusPill>
          <StatusPill tone="danger" glyph="⛒">Revoked</StatusPill>
          <StatusPill striped glyph="⚠">Untrusted</StatusPill>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
