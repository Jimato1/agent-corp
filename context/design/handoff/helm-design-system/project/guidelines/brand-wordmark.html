<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark (no logo provided)" subtitle="Plain type where a mark would sit — none was drawn or invented" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); padding: var(--space-6); display: flex; gap: var(--space-8); align-items: center; }
  .mark { display: flex; flex-direction: column; gap: 2px; }
  .app { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); }
  .name { font-family: var(--font-ui); font-size: 32px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
  .name .stop { color: var(--halt-gold); }
  .divider { width: 1px; align-self: stretch; background: var(--border-default); }
  .note { font-family: var(--font-ui); font-size: 12px; line-height: 18px; color: var(--text-secondary); max-width: 300px; }
  .note b { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="mark">
    <div class="app">Mission Control</div>
    <div class="name">Helm</div>
  </div>
  <div class="divider"></div>
  <div class="note">No logo was provided in the brief, so <b>none was drawn or invented</b>. The wordmark is Inter 600 with a muted mono app-name eyebrow above. Drop a real mark into <code style="font-size:11px">assets/</code> to replace it.</div>
</body>
</html>
