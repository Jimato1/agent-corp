<!-- @dsCard group="Spacing" viewport="700x180" name="Control heights & radii" subtitle="28 / 32 / 40px · radii 4 · 6 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); padding: var(--space-6); display: flex; gap: var(--space-8); align-items: center; }
  .col { display: flex; flex-direction: column; gap: var(--space-3); }
  .lbl { font-family: var(--font-ui); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
  .ctrls { display: flex; align-items: center; gap: var(--space-3); }
  .btn { display: inline-flex; align-items: center; padding: 0 14px; border-radius: var(--radius-control); font-family: var(--font-ui); font-size: 13px; font-weight: 500; background: var(--surface-control); color: var(--text-primary); border: 1px solid var(--border-strong); }
  .radii { display: flex; align-items: flex-end; gap: var(--space-4); }
  .swatch { width: 52px; height: 52px; background: var(--surface-control); border: 1px solid var(--border-strong); }
  .rlbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 6px; }
  .divider { width: 1px; align-self: stretch; background: var(--border-default); }
</style>
</head>
<body>
  <div class="col">
    <div class="lbl">Control heights</div>
    <div class="ctrls">
      <div class="btn" style="height:28px">Compact 28</div>
      <div class="btn" style="height:32px">Default 32</div>
      <div class="btn" style="height:40px;font-size:14px">Primary 40</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="lbl">Radii</div>
    <div class="radii">
      <div><div class="swatch" style="border-radius:4px"></div><div class="rlbl">4 · control</div></div>
      <div><div class="swatch" style="border-radius:6px"></div><div class="rlbl">6 · panel</div></div>
      <div><div class="swatch" style="border-radius:999px"></div><div class="rlbl">pill</div></div>
    </div>
  </div>
</body>
</html>
