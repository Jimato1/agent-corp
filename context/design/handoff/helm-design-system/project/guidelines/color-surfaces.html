<!-- @dsCard group="Colors" viewport="700x188" name="Surface ramp" subtitle="Cool near-black — panels separate by value + hairline, never shadow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: var(--space-6); }
  .ramp { display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px; background: var(--border-default); border: 1px solid var(--border-default); border-radius: var(--radius-panel); overflow: hidden; }
  .cell { padding: var(--space-3) var(--space-2) var(--space-2); min-height: 108px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--font-ui); font-size: 11px; font-weight: 600; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.01em; }
  .use { font-family: var(--font-ui); font-size: 10px; line-height: 13px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="cell" style="background: var(--surface-backdrop);"><div class="name">backdrop</div><div><div class="hex">#0A0C10</div><div class="use">app</div></div></div>
    <div class="cell" style="background: var(--surface-screen);"><div class="name">screen</div><div><div class="hex">#0E1116</div><div class="use">screen bg</div></div></div>
    <div class="cell" style="background: var(--surface-panel);"><div class="name">panel</div><div><div class="hex">#12161C</div><div class="use">card</div></div></div>
    <div class="cell" style="background: var(--surface-raised);"><div class="name">raised</div><div><div class="hex">#171C24</div><div class="use">header/rail</div></div></div>
    <div class="cell" style="background: var(--surface-inset);"><div class="name">inset</div><div><div class="hex">#1E242E</div><div class="use">well/stripe</div></div></div>
    <div class="cell" style="background: var(--surface-control);"><div class="name">control</div><div><div class="hex">#262E39</div><div class="use">fill</div></div></div>
    <div class="cell" style="background: var(--border-hairline);"><div class="name">hairline</div><div><div class="hex">#323C49</div><div class="use">border</div></div></div>
    <div class="cell" style="background: var(--border-strong);"><div class="name">strong</div><div><div class="hex">#45525F</div><div class="use">outline</div></div></div>
  </div>
</body>
</html>
