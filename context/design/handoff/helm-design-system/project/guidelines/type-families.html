<!-- @dsCard group="Type" viewport="700x220" name="Three families, three jobs" subtitle="Inter chrome · JetBrains Mono machine truth · Source Serif 4 reading" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); padding: var(--space-6); }
  .rows { display: flex; flex-direction: column; gap: var(--space-3); }
  .r { display: grid; grid-template-columns: 130px 1fr; align-items: baseline; gap: var(--space-4); padding-bottom: var(--space-3); border-bottom: 1px solid var(--border-default); }
  .r:last-child { border-bottom: 0; padding-bottom: 0; }
  .meta { }
  .fam { font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .job { font-family: var(--font-ui); font-size: 11px; line-height: 15px; color: var(--text-muted); margin-top: 2px; }
  .spec-ui { font-family: var(--font-ui); font-size: 26px; font-weight: 600; color: var(--text-primary); }
  .spec-mono { font-family: var(--font-mono); font-size: 22px; color: var(--signal-cyan-ink); font-feature-settings: 'tnum' 1; }
  .spec-serif { font-family: var(--font-serif); font-size: 24px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="rows">
    <div class="r">
      <div class="meta"><div class="fam">Inter</div><div class="job">All UI chrome</div></div>
      <div class="spec-ui">Supervise the fleet</div>
    </div>
    <div class="r">
      <div class="meta"><div class="fam">JetBrains Mono</div><div class="job">All machine truth</div></div>
      <div class="spec-mono">agent:patcher-07 · 0/O 1/l</div>
    </div>
    <div class="r">
      <div class="meta"><div class="fam">Source Serif 4</div><div class="job">Workshop reading only</div></div>
      <div class="spec-serif">What did it make, and is it any good?</div>
    </div>
  </div>
</body>
</html>
