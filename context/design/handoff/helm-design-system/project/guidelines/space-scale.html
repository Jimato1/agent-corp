<!-- @dsCard group="Spacing" viewport="700x172" name="Spacing scale" subtitle="4px base — 4 · 8 · 12 · 16 · 24 · 32 · 48" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); padding: var(--space-6); }
  .row { display: flex; align-items: flex-end; gap: var(--space-4); }
  .step { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .bar { background: var(--signal-cyan); border-radius: 2px; width: 100%; }
  .box { display: flex; align-items: flex-end; height: 56px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .px { font-family: var(--font-ui); font-size: 12px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="box"><div class="bar" style="height:4px;width:16px"></div></div><div class="px">4</div><div class="tok">space-1</div></div>
    <div class="step"><div class="box"><div class="bar" style="height:8px;width:20px"></div></div><div class="px">8</div><div class="tok">space-2</div></div>
    <div class="step"><div class="box"><div class="bar" style="height:12px;width:24px"></div></div><div class="px">12</div><div class="tok">space-3</div></div>
    <div class="step"><div class="box"><div class="bar" style="height:16px;width:28px"></div></div><div class="px">16</div><div class="tok">space-4</div></div>
    <div class="step"><div class="box"><div class="bar" style="height:24px;width:36px"></div></div><div class="px">24</div><div class="tok">space-6</div></div>
    <div class="step"><div class="box"><div class="bar" style="height:32px;width:44px"></div></div><div class="px">32</div><div class="tok">space-8</div></div>
    <div class="step"><div class="box"><div class="bar" style="height:48px;width:56px"></div></div><div class="px">48</div><div class="tok">space-12</div></div>
  </div>
</body>
</html>
