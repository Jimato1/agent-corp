<!-- @dsCard group="Type" viewport="700x188" name="Machine truth — mono" subtitle="Tabular figures · unambiguous 0/O 1/l · never wrapped" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-screen); padding: var(--space-6); }
  .well { background: var(--surface-inset); border: 1px solid var(--border-default); border-radius: var(--radius-panel); padding: var(--space-3) var(--space-4); font-family: var(--font-mono); font-size: 13px; line-height: 18px; font-feature-settings: 'tnum' 1; }
  .l { display: flex; gap: var(--space-3); }
  .k { color: var(--text-muted); width: 92px; }
  .v { color: var(--text-primary); }
  .id { color: var(--signal-cyan-ink); }
  .num { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="well">
    <div class="l"><span class="k">agent</span><span class="id">agent:patcher-07</span></div>
    <div class="l"><span class="k">ticket</span><span class="id">T-000123</span></div>
    <div class="l"><span class="k">lease</span><span class="v">gen 47 · 04:12 · <span style="color:var(--state-green)">♥ 0.8s</span></span></div>
    <div class="l"><span class="k">epoch</span><span class="num">1751500800.482</span></div>
    <div class="l"><span class="k">hash</span><span class="v">sha256:9f2c…a1e0</span></div>
    <div class="l"><span class="k">budget</span><span class="num">14,208 / 20,000 tok</span></div>
  </div>
</body>
</html>
