<!-- @dsCard group="Type" viewport="700x230" name="Workshop reading body" subtitle="Source Serif 4 · 17/28 · operator-zoomable · paper only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: var(--space-6); }
  .pane { background: var(--paper-page); border-radius: var(--radius-panel); padding: var(--space-6) var(--space-8); max-width: 620px; box-shadow: var(--shadow-dialog); }
  .eyebrow { font-family: var(--font-ui); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #8A8A7E; margin-bottom: var(--space-2); }
  h3 { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--paper-ink); margin: 0 0 var(--space-3); }
  p { font-family: var(--font-serif); font-size: 17px; line-height: 28px; color: var(--paper-ink); margin: 0; }
</style>
</head>
<body>
  <div class="pane">
    <div class="eyebrow">Notes · draft</div>
    <h3>Reading is a different posture</h3>
    <p>Inside a Workshop pane the substrate changes to warm paper and a humanist serif, tuned for sustained reading. The shell around it stays dark, and the safety grammar never changes — a stop looks the same here as on the Gateway.</p>
  </div>
</body>
</html>
