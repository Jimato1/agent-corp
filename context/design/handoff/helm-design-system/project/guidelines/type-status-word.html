<!-- @dsCard group="Type" viewport="700x180" name="The loud status word" subtitle="22/26 — the single loudest thing on any screen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--halt-gold-wash); padding: var(--space-6); border-top: 2px solid var(--halt-gold); }
  .band { display: flex; align-items: center; gap: var(--space-4); }
  .glyph { font-size: 26px; color: var(--halt-gold); }
  .stack { display: flex; flex-direction: column; gap: 2px; }
  .word { font-family: var(--font-ui); font-size: 22px; line-height: 26px; font-weight: 600; letter-spacing: 0.01em; color: var(--halt-gold-ink); }
  .sub { font-family: var(--font-ui); font-size: 13px; line-height: 20px; color: var(--halt-gold-ink); opacity: 0.82; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--halt-gold-ink); opacity: 0.6; margin-top: var(--space-4); }
</style>
</head>
<body>
  <div class="band">
    <span class="glyph">▮▮</span>
    <div class="stack">
      <div class="word">KILL-SWITCH ENGAGED</div>
      <div class="sub">Destructive &amp; approve/execute paths are refused suite-wide; benign reads continue.</div>
    </div>
  </div>
  <div class="note">--type-status: 22/26 · weight 600 · reserved for the kill-level readout</div>
</body>
</html>
