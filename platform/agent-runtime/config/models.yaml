# config/models.yaml — role -> pinned, signed model (PLAN §6.2; read by the
# fail-closed provenance gate). A change is a REVIEWED COMMIT, never a runtime
# mutation. The per-role matrix + final pins + quant are PENDING-SIZING (RESEARCH
# §6, gap-1.2); the digests/sha256/sig_ref below are STRUCTURAL PLACEHOLDERS.
#
# HONESTY: with no real hash/Sigstore verifier wired (sandbox), the gate FAILS
# CLOSED on every role — provenance_verified=false, the model is NOT admitted, and
# the UI renders `⚠ CANNOT CONFIRM PROVENANCE` (never a fabricated green). Wiring
# the real verifiers + real artifacts (the Hub) is the deployment step that flips
# these to VERIFIED — an INTEGRATION / CANNOT-VERIFY-IN-SANDBOX item.

